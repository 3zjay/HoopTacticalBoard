<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hoop Board">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="https://img.icons8.com/emoji/256/basketball.png">
<title>Hoop Culture – Tactical Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & ROOT
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #0d0f14;
  --panel:     #13161e;
  --panel2:    #1c2030;
  --border:    #252b3a;
  --border2:   #2f3750;
  --accent:    #f07820;
  --accent2:   #ffaa55;
  --defense:   #4aa8ff;
  --text:      #dde2f0;
  --text2:     #7a85a3;
  --text3:     #4d566e;
  --radius:    8px;
  /* Safe area insets for iPad notch / home bar */
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  font-family: 'Barlow Condensed', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  /* Respect safe areas when installed as PWA */
  padding-top: var(--safe-t);
  padding-bottom: var(--safe-b);
  padding-left: var(--safe-l);
  padding-right: var(--safe-r);
  user-select: none;
  -webkit-user-select: none;
  /* Prevent iOS callout on long press */
  -webkit-touch-callout: none;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  flex-shrink: 0;
  gap: 8px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo-ball {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  box-shadow: 0 0 14px rgba(240,120,32,0.45);
}

.logo-text {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1;
}

.logo-text span { color: var(--accent); }

.header-center {
  display: flex;
  align-items: center;
  gap: 8px;
}

.court-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.court-toggle button {
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.8px;
  cursor: pointer;
  transition: all 0.15s;
  /* Larger touch target */
  min-height: 36px;
}

.court-toggle button.active {
  background: var(--panel2);
  color: var(--text);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}

.btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 11px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.4px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  min-height: 36px;         /* iPad touch target */
  touch-action: manipulation;
}

.btn:hover, .btn:active { border-color: var(--border2); color: var(--text); }

.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-accent:hover, .btn-accent:active {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}

/* ============================================================
   PENCIL INDICATOR  (shows when Apple Pencil detected)
   ============================================================ */
#pencil-badge {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 20px;
  border: 1px solid rgba(240,120,32,0.4);
  background: rgba(240,120,32,0.1);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}

#pencil-badge.visible { display: flex; }

#pressure-bar-wrap {
  width: 40px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

#pressure-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  width: 0%;
  transition: width 0.05s;
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ============================================================
   LEFT SIDEBAR – TOOLS
   ============================================================ */
.tools-sidebar {
  width: 56px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 2px;
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
}

.tool-sep {
  width: 32px;
  height: 1px;
  background: var(--border);
  margin: 4px 0;
  flex-shrink: 0;
}

.tool-btn {
  position: relative;
  width: 44px;           /* iPad touch target ≥ 44px */
  height: 44px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  touch-action: manipulation;
}

.tool-btn svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: var(--text2);
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.15s;
  pointer-events: none;
}

.tool-btn:hover, .tool-btn:active { background: var(--panel2); }
.tool-btn:hover svg, .tool-btn:active svg { stroke: var(--text); }

.tool-btn.active {
  background: rgba(240,120,32,0.12);
  border-color: rgba(240,120,32,0.5);
}

.tool-btn.active svg { stroke: var(--accent); }

.tool-tip {
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%);
  background: #000;
  color: #fff;
  padding: 4px 9px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  letter-spacing: 0.3px;
}

.tool-tip::before {
  content: '';
  position: absolute;
  right: 100%; top: 50%;
  transform: translateY(-50%);
  border: 5px solid transparent;
  border-right-color: #000;
}

.tool-btn:hover .tool-tip { opacity: 1; }

/* ============================================================
   CANVAS AREA
   ============================================================ */
.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  background: var(--bg);
  overflow: hidden;
  position: relative;
  min-width: 0;
}

#board {
  display: block;
  border-radius: 3px;
  /* CRITICAL for Apple Pencil — disable all browser gesture handling */
  touch-action: none;
  -webkit-touch-callout: none;
  cursor: crosshair;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.6);
}

/* ============================================================
   RIGHT SIDEBAR – PLAYERS & OPTIONS
   ============================================================ */
.right-sidebar {
  width: 136px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 10px 8px;
  gap: 10px;
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.rs-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 2px;
  flex-shrink: 0;
}

.player-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.player-chip {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 7px;        /* bigger touch target */
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--panel2);
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  min-height: 40px;
}

.player-chip:active { border-color: var(--border2); background: #222840; }
.player-chip.placing {
  border-color: var(--accent);
  background: rgba(240,120,32,0.1);
}

.p-circle {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.p-off { background: var(--accent); color: #fff; }
.p-def { background: transparent; border: 2px solid var(--defense); color: var(--defense); }

.p-label { font-size: 13px; font-weight: 600; color: var(--text2); }

/* Color palette */
.color-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 2px;
}

.c-swatch {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  flex-shrink: 0;
  touch-action: manipulation;
}

.c-swatch:active { transform: scale(1.1); }
.c-swatch.active { border-color: #fff; transform: scale(1.15); }

/* Pressure sensitivity toggle */
.pressure-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}

.toggle-switch input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border2);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}

.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

/* Line width */
.line-width-wrap input[type=range] {
  width: 100%;
  accent-color: var(--accent);
  cursor: pointer;
  height: 20px;  /* bigger touch target */
}

/* Formations */
.formation-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.formation-btn {
  padding: 7px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.3px;
  transition: all 0.15s;
  touch-action: manipulation;
  min-height: 36px;
}

.formation-btn:active { border-color: var(--border2); color: var(--text); }

/* Saved plays */
.play-name-input {
  flex: 1;
  padding: 6px 7px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  outline: none;
  min-width: 0;
}

.play-name-input:focus { border-color: var(--accent); }

.save-btn {
  width: 100%;
  text-align: center;
  margin-bottom: 5px;
  color: var(--accent);
  border-color: rgba(240,120,32,0.3);
}

.save-btn:active { border-color: var(--accent); background: rgba(240,120,32,0.08); color: var(--accent2); }

.saved-list { display: flex; flex-direction: column; gap: 3px; }

.saved-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  padding: 6px 6px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--panel2);
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  min-width: 0;
  touch-action: manipulation;
  min-height: 34px;
}

.saved-chip:active { border-color: var(--border2); color: var(--text); }
.saved-chip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.saved-chip-del {
  flex-shrink: 0;
  color: var(--text3);
  font-size: 15px;
  padding: 2px 4px;
  cursor: pointer;
  transition: color 0.12s;
  touch-action: manipulation;
}

.saved-chip-del:active { color: #ff5555; }

/* ============================================================
   STATUS BAR
   ============================================================ */
.status-bar {
  height: 30px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.3px;
}

#status-text { color: var(--text2); }

/* ============================================================
   ANIMATION / RECORDING
   ============================================================ */
.btn-record {
  background: rgba(255,40,40,0.15);
  border-color: #ff4444;
  color: #ff6666;
  animation: pulse-rec 1.2s ease-in-out infinite;
}

.btn-record:hover { background: rgba(255,40,40,0.28); color: #ff8888; }

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,60,0.35); }
  50%       { box-shadow: 0 0 0 5px rgba(255,60,60,0); }
}

.rec-badge {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff3333;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 12px;
  border-radius: 20px;
  pointer-events: none;
  display: none;
  z-index: 10;
  animation: pulse-rec 1.2s ease-in-out infinite;
}

.rec-badge.visible { display: block; }

#anim-controls {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 8px;
  align-items: center;
  background: rgba(0,0,0,0.8);
  border: 1px solid var(--border2);
  border-radius: 40px;
  padding: 8px 18px;
  z-index: 20;
}

#anim-controls.visible { display: flex; }

#anim-controls button {
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.12s;
  touch-action: manipulation;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#anim-controls button:active { background: rgba(255,255,255,0.1); }

#anim-progress {
  width: 130px;
  accent-color: var(--accent);
  cursor: pointer;
  height: 24px;
}

#anim-frame-label {
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  font-weight: 600;
  min-width: 54px;
  text-align: center;
}

/* ============================================================
   TEXT MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 500;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 22px;
  width: 300px;
}

.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }

.modal input[type=text] {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  outline: none;
  margin-bottom: 12px;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-ball">🏀</div>
    <div class="logo-text">HOOP <span>BOARD</span></div>
  </div>

  <div class="header-center">
    <div class="court-toggle">
      <button id="btn-full" class="active" onclick="setCourt('full')">FULL</button>
      <button id="btn-half" onclick="setCourt('half')">HALF</button>
    </div>
    <!-- Apple Pencil indicator -->
    <div id="pencil-badge">
      ✏️ PENCIL
      <div id="pressure-bar-wrap"><div id="pressure-bar"></div></div>
    </div>
  </div>

  <div class="header-actions">
    <button class="btn" onclick="undo()">↩ Undo</button>
    <button class="btn" onclick="redo()">↪ Redo</button>
    <button class="btn" id="btn-animate" onclick="toggleAnimMode()">⏺ Animate</button>
    <button class="btn" onclick="clearBoard()">🗑 Clear</button>
    <button class="btn btn-accent" onclick="exportImage()">↓ PNG</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: TOOLS -->
  <nav class="tools-sidebar">

    <button class="tool-btn active" id="tool-select" onclick="setTool('select')">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
      <span class="tool-tip">Select / Move  [V]</span>
    </button>

    <div class="tool-sep"></div>

    <button class="tool-btn" id="tool-arrow" onclick="setTool('arrow')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="10,5 19,5 19,14"/></svg>
      <span class="tool-tip">Straight Arrow  [A]</span>
    </button>

    <button class="tool-btn" id="tool-dashed" onclick="setTool('dashed')">
      <svg viewBox="0 0 24 24" stroke-dasharray="3,2"><line x1="5" y1="19" x2="18" y2="6"/><polyline points="10,6 18,6 18,14" stroke-dasharray="0"/></svg>
      <span class="tool-tip">Dashed Arrow (cuts)  [D]</span>
    </button>

    <button class="tool-btn" id="tool-curve" onclick="setTool('curve')">
      <svg viewBox="0 0 24 24"><path d="M5 19 Q12 4 19 12"/><polyline points="15,7 19,12 14,14"/></svg>
      <span class="tool-tip">Curved Arrow  [C]</span>
    </button>

    <button class="tool-btn" id="tool-line" onclick="setTool('line')">
      <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      <span class="tool-tip">Plain Line  [L]</span>
    </button>

    <div class="tool-sep"></div>

    <button class="tool-btn" id="tool-screen" onclick="setTool('screen')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="17" y2="12"/><line x1="17" y1="6" x2="17" y2="18"/></svg>
      <span class="tool-tip">Screen / Pick  [S]</span>
    </button>

    <button class="tool-btn" id="tool-zone" onclick="setTool('zone')">
      <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="2" stroke-dasharray="3,2"/></svg>
      <span class="tool-tip">Zone Area  [Z]</span>
    </button>

    <div class="tool-sep"></div>

    <button class="tool-btn" id="tool-text" onclick="setTool('text')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="4" x2="12" y2="20"/><line x1="6" y1="7" x2="18" y2="7"/></svg>
      <span class="tool-tip">Text Label  [T]</span>
    </button>

    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l13-13 7 7-3 10z"/><line x1="6" y1="17" x2="13" y2="10"/></svg>
      <span class="tool-tip">Eraser  [E]</span>
    </button>

  </nav>

  <!-- CENTER: CANVAS -->
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="rec-badge" id="rec-badge">⏺ REC</div>
    <canvas id="board"></canvas>
    <div id="anim-controls">
      <button id="anim-play-btn" onclick="animPlayPause()">▶</button>
      <input type="range" id="anim-progress" min="0" value="0" oninput="animSeek(+this.value)">
      <span id="anim-frame-label">0 / 0</span>
      <button onclick="stopAnimation()">✕</button>
    </div>
  </div>

  <!-- RIGHT: PLAYERS & OPTIONS -->
  <aside class="right-sidebar">

    <div class="rs-title">Offense</div>
    <div class="player-list" id="offense-list"></div>

    <div class="rs-title">Defense</div>
    <div class="player-list" id="defense-list"></div>

             oninput="S.baseLineWidth = +this.value; document.getElementById('lw-val').textContent = this.value + 'px'">

<script>
// ============================================================
// NBA COURT CONSTANTS (feet)
// ============================================================
const NBA = {
  length: 94, halfLength: 47, width: 50,
  basketFromBaseline: 5.25,
  backboardFromBaseline: 4,
  threeRadius: 23.75,
  threeCornerY: 3,
  paintW: 16,
  paintL: 19,
  ftRadius: 6,
  centerRadius: 6,
  restrictedRadius: 4,
};

// ============================================================
// STATE
// ============================================================
const S = {
  tool: 'select',
  courtMode: 'full',
  players: [],
  strokes: [],
  labels: [],
  undoStack: [],
  redoStack: [],

  isDrawing: false,
  currentStroke: null,
  startX: 0, startY: 0,

  dragging: null,
  dragOffX: 0, dragOffY: 0,

  placingPlayer: null,

  color: '#f07820',
  baseLineWidth: 2,
  lineWidth: 2,          // actual width used (may be pressure-scaled)

  courtX: 0, courtY: 0, courtW: 0, courtH: 0, scale: 1,
  textPending: null,
};

// ============================================================
// APPLE PENCIL STATE
// ============================================================
const PENCIL = {
  detected: false,
  lastPenTime: 0,           // timestamp of last pen pointer event
  PALM_REJECT_MS: 800,      // ignore finger touches for this long after pencil use
  activePenId: null,        // pointer id currently drawing with pencil
  pressureEnabled: true,
};

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const aw = wrap.clientWidth - 24;
  const ah = wrap.clientHeight - 24;
  const ftW = S.courtMode === 'full' ? NBA.length : NBA.halfLength;
  const aspect = ftW / NBA.width;

  let w, h;
  if (aw / ah > aspect) { h = ah; w = h * aspect; }
  else { w = aw; h = w / aspect; }

  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
  redraw();
}

// ============================================================
// COURT DRAWING
// ============================================================
function drawCourt() {
  const pad = 14;
  const ftW = S.courtMode === 'full' ? NBA.length : NBA.halfLength;
  const sc  = Math.min((canvas.width - pad*2) / ftW, (canvas.height - pad*2) / NBA.width);
  const cW  = ftW * sc, cH = NBA.width * sc;
  const cX  = (canvas.width  - cW) / 2;
  const cY  = (canvas.height - cH) / 2;

  S.courtX = cX; S.courtY = cY;
  S.courtW = cW; S.courtH = cH; S.scale = sc;

  const fx = x => cX + x * sc;
  const fy = y => cY + y * sc;
  const fs = r => r * sc;

  ctx.fillStyle = '#0d0f14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Hardwood
  const stripes = 22;
  const sh = cH / stripes;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#bf7224' : '#b46820';
    ctx.fillRect(cX, cY + i * sh, cW, sh + 0.5);
  }

  // Grain
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= stripes; i++) {
    ctx.beginPath();
    ctx.moveTo(cX, cY + i * sh);
    ctx.lineTo(cX + cW, cY + i * sh);
    ctx.stroke();
  }
  ctx.restore();

  // Clip to court
  ctx.save();
  ctx.beginPath();
  ctx.rect(cX, cY, cW, cH);
  ctx.clip();

  ctx.strokeStyle = 'rgba(255,255,255,0.88)';
  ctx.lineWidth   = Math.max(1, sc * 0.22);
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  ctx.strokeRect(cX, cY, cW, cH);

  if (S.courtMode === 'full') {
    ctx.beginPath();
    ctx.moveTo(fx(47), fy(0)); ctx.lineTo(fx(47), fy(50)); ctx.stroke();
    drawCircle(ctx, fx(47), fy(25), fs(6));
    drawCircle(ctx, fx(47), fy(25), fs(2));
    drawHalfCourt(ctx, fx, fy, fs, 'left');
    drawHalfCourt(ctx, fx, fy, fs, 'right');
  } else {
    drawHalfCourt(ctx, fx, fy, fs, 'left');
    ctx.beginPath(); ctx.arc(fx(47), fy(25), fs(6), 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(fx(47), fy(25), fs(2), 0, Math.PI * 2); ctx.stroke();
  }

  ctx.restore();
}

function drawCircle(ctx, x, y, r) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
}

function drawHalfCourt(ctx, fx, fy, fs, side) {
  const L   = side === 'left';
  const bxFt = L ? NBA.basketFromBaseline : NBA.length - NBA.basketFromBaseline;
  const bx  = fx(bxFt), by = fy(25);

  const pL = L ? 0 : NBA.length - NBA.paintL;
  const pR = L ? NBA.paintL : NBA.length;
  const pT = 25 - NBA.paintW / 2;
  const pB = 25 + NBA.paintW / 2;

  ctx.fillStyle = 'rgba(140,68,8,0.38)';
  ctx.fillRect(fx(pL), fy(pT), fx(pR) - fx(pL), fy(pB) - fy(pT));
  ctx.strokeRect(fx(pL), fy(pT), fx(pR) - fx(pL), fy(pB) - fy(pT));

  for (const d of [7, 11, 14, 17]) {
    const hx = L ? d : NBA.length - d;
    ctx.beginPath(); ctx.moveTo(fx(hx), fy(pT - 1.2)); ctx.lineTo(fx(hx), fy(pT)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx(hx), fy(pB)); ctx.lineTo(fx(hx), fy(pB + 1.2)); ctx.stroke();
  }

  const ftX = L ? NBA.paintL : NBA.length - NBA.paintL;
  ctx.beginPath();
  if (L) ctx.arc(fx(ftX), fy(25), fs(NBA.ftRadius),  Math.PI/2, -Math.PI/2, true);
  else   ctx.arc(fx(ftX), fy(25), fs(NBA.ftRadius), -Math.PI/2,  Math.PI/2, false);
  ctx.stroke();

  ctx.save();
  ctx.setLineDash([Math.max(4, fs(0.8)), Math.max(3, fs(0.5))]);
  ctx.beginPath();
  if (L) ctx.arc(fx(ftX), fy(25), fs(NBA.ftRadius), -Math.PI/2,  Math.PI/2, false);
  else   ctx.arc(fx(ftX), fy(25), fs(NBA.ftRadius),  Math.PI/2, -Math.PI/2, true);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  const tR       = NBA.threeRadius;
  const cDist    = 25 - NBA.threeCornerY;
  const arcAngle = Math.atan2(cDist, Math.sqrt(tR*tR - cDist*cDist));
  const arcEndX  = bxFt + (L ? 1 : -1) * Math.sqrt(tR*tR - cDist*cDist);

  ctx.beginPath();
  ctx.moveTo(L ? fx(0) : fx(NBA.length), fy(NBA.threeCornerY));
  ctx.lineTo(fx(arcEndX), fy(NBA.threeCornerY));
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(L ? fx(0) : fx(NBA.length), fy(NBA.width - NBA.threeCornerY));
  ctx.lineTo(fx(arcEndX), fy(NBA.width - NBA.threeCornerY));
  ctx.stroke();

  ctx.beginPath();
  if (L) ctx.arc(bx, by, fs(tR), -arcAngle, arcAngle, false);
  else   ctx.arc(bx, by, fs(tR), Math.PI - arcAngle, Math.PI + arcAngle, false);
  ctx.stroke();

  ctx.beginPath();
  if (L) ctx.arc(bx, by, fs(NBA.restrictedRadius), -Math.PI/2,  Math.PI/2, false);
  else   ctx.arc(bx, by, fs(NBA.restrictedRadius),  Math.PI/2, -Math.PI/2, true);
  ctx.stroke();

  const bbX = L ? NBA.backboardFromBaseline : NBA.length - NBA.backboardFromBaseline;
  ctx.lineWidth = Math.max(2, fs(0.35));
  ctx.beginPath();
  ctx.moveTo(fx(bbX), fy(22)); ctx.lineTo(fx(bbX), fy(28));
  ctx.stroke();
  ctx.lineWidth = Math.max(1, fs(0.22));

  ctx.save();
  ctx.strokeStyle = '#ff7722';
  ctx.lineWidth   = Math.max(1.5, fs(0.2));
  ctx.beginPath(); ctx.arc(bx, by, fs(0.75), 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  ctx.lineWidth = Math.max(1, fs(0.22));
}

// ============================================================
// STROKE RENDERING
// ============================================================
function drawStrokes() {
  for (const st of S.strokes) renderStroke(st);
  if (S.isDrawing && S.currentStroke) renderStroke(S.currentStroke);
}

function renderStroke(st) {
  const pts = st.points;
  if (!pts || pts.length < 2) return;

  ctx.save();
  ctx.strokeStyle = st.color;
  ctx.fillStyle   = st.color;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  const last = pts[pts.length - 1];
  const prev = pts[pts.length - 2];

  if (st.type === 'zone') {
    ctx.setLineDash([6, 5]);
    ctx.globalAlpha = 0.3;
    ctx.fillRect(
      Math.min(pts[0].x, last.x), Math.min(pts[0].y, last.y),
      Math.abs(last.x - pts[0].x), Math.abs(last.y - pts[0].y)
    );
    ctx.globalAlpha = 0.7;
    ctx.lineWidth = st.lw;
    ctx.strokeRect(
      Math.min(pts[0].x, last.x), Math.min(pts[0].y, last.y),
      Math.abs(last.x - pts[0].x), Math.abs(last.y - pts[0].y)
    );
    ctx.setLineDash([]);
    ctx.restore();
    return;
  }

  if (st.type === 'dashed') ctx.setLineDash([Math.max(6, st.lw * 4), Math.max(4, st.lw * 2.5)]);

  if (st.type === 'curve') {
    // Variable-width curve using pressure data per point
    if (pts.length >= 2 && pts[0].lw !== undefined) {
      // Draw as connected variable-width segments
      for (let i = 0; i < pts.length - 1; i++) {
        const p1 = pts[i], p2 = pts[i + 1];
        ctx.lineWidth = (p1.lw + p2.lw) / 2;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        // Smooth with catmull-rom
        if (i < pts.length - 2) {
          const p3 = pts[i + 2];
          const cpx = p2.x - (p3.x - p1.x) / 6;
          const cpy = p2.y - (p3.y - p1.y) / 6;
          const cp2x = p2.x + (p3.x - p1.x) / 6;
          const cp2y = p2.y + (p3.y - p1.y) / 6;
          ctx.bezierCurveTo(p1.x + (p2.x - pts[Math.max(0,i-1)].x)/6,
                            p1.y + (p2.y - pts[Math.max(0,i-1)].y)/6,
                            cpx, cpy, p2.x, p2.y);
        } else {
          ctx.lineTo(p2.x, p2.y);
        }
        ctx.stroke();
      }
    } else {
      ctx.lineWidth = st.lw;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(0, i-1)];
        const p1 = pts[i];
        const p2 = pts[i+1];
        const p3 = pts[Math.min(pts.length-1, i+2)];
        ctx.bezierCurveTo(
          p1.x + (p2.x - p0.x)/6, p1.y + (p2.y - p0.y)/6,
          p2.x - (p3.x - p1.x)/6, p2.y - (p3.y - p1.y)/6,
          p2.x, p2.y
        );
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
    drawArrowHead(ctx, prev.x, prev.y, last.x, last.y, st.color, last.lw || st.lw);

  } else if (st.type === 'screen') {
    ctx.lineWidth = st.lw;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
    const ang = Math.atan2(last.y - pts[0].y, last.x - pts[0].x);
    const bl  = Math.max(12, st.lw * 6);
    ctx.lineWidth = st.lw * 2;
    ctx.beginPath();
    ctx.moveTo(last.x + bl * Math.cos(ang + Math.PI/2), last.y + bl * Math.sin(ang + Math.PI/2));
    ctx.lineTo(last.x + bl * Math.cos(ang - Math.PI/2), last.y + bl * Math.sin(ang - Math.PI/2));
    ctx.stroke();

  } else if (st.type === 'line') {
    ctx.lineWidth = st.lw;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    ctx.lineTo(last.x, last.y);
    ctx.stroke();

  } else {
    // arrow / dashed
    ctx.lineWidth = st.lw;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
    ctx.setLineDash([]);
    drawArrowHead(ctx, pts[0].x, pts[0].y, last.x, last.y, st.color, st.lw);
  }

  ctx.setLineDash([]);
  ctx.restore();
}

function drawArrowHead(ctx, fx, fy, tx, ty, color, lw) {
  const ang  = Math.atan2(ty - fy, tx - fx);
  const hLen = Math.max(10, lw * 5);
  const spread = 0.42;
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - hLen * Math.cos(ang - spread), ty - hLen * Math.sin(ang - spread));
  ctx.lineTo(tx - hLen * Math.cos(ang + spread), ty - hLen * Math.sin(ang + spread));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// LABELS
// ============================================================
function drawLabels() {
  for (const lb of S.labels) {
    ctx.save();
    ctx.fillStyle   = lb.color;
    ctx.shadowColor = 'rgba(0,0,0,0.85)';
    ctx.shadowBlur  = 5;
    const fs = Math.max(12, S.scale * 1.6);
    ctx.font         = `700 ${fs}px Barlow Condensed, sans-serif`;
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(lb.text, lb.x, lb.y);
    ctx.restore();
  }
}

// ============================================================
// PLAYERS
// ============================================================
function playerRadius() {
  return Math.max(14, Math.min(24, S.scale * 2.1));
}

function drawPlayers() {
  const r = playerRadius();
  for (const p of S.players) {
    ctx.save();
    if (p.team === 'O') {
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle   = p.color;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.shadowBlur  = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth   = 1;
      ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle   = 'rgba(0,0,0,0.55)';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur  = 8;
      ctx.fill();
      ctx.shadowBlur  = 0;
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = 2.5;
      ctx.stroke();
    }
    ctx.fillStyle    = p.team === 'O' ? '#fff' : p.color;
    ctx.font         = `700 ${Math.round(r * 0.9)}px Barlow Condensed, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.number, p.x, p.y + 1);
    ctx.restore();
  }
}

// ============================================================
// REDRAW
// ============================================================
function redraw() {
  drawCourt();
  drawStrokes();
  drawLabels();
  drawPlayers();
}

// ============================================================
// COORDINATE HELPERS
// ============================================================
function canvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx   = canvas.width  / rect.width;
  const sy   = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
}

function playerAt(x, y) {
  const r = playerRadius() + 6;
  for (let i = S.players.length - 1; i >= 0; i--) {
    const p = S.players[i];
    if ((p.x-x)**2 + (p.y-y)**2 <= r*r) return p;
  }
  return null;
}

function strokeAt(x, y) {
  const thresh = 12;
  for (let i = S.strokes.length - 1; i >= 0; i--) {
    const st  = S.strokes[i];
    const pts = st.points;
    if (st.type === 'zone') {
      const l = pts[0], r2 = pts[pts.length-1];
      const rx = Math.min(l.x,r2.x), ry = Math.min(l.y,r2.y);
      const rw = Math.abs(r2.x-l.x), rh = Math.abs(r2.y-l.y);
      if (x>=rx-thresh && x<=rx+rw+thresh && y>=ry-thresh && y<=ry+rh+thresh) return i;
      continue;
    }
    for (let j = 0; j < pts.length - 1; j++) {
      if (segDist(x, y, pts[j].x, pts[j].y, pts[j+1].x, pts[j+1].y) < thresh) return i;
    }
  }
  return -1;
}

function labelAt(x, y) {
  for (let i = S.labels.length - 1; i >= 0; i--) {
    const lb = S.labels[i];
    if (Math.abs(lb.x - x) < 100 && Math.abs(lb.y - y) < 28) return i;
  }
  return -1;
}

function segDist(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  const len2 = dx*dx + dy*dy;
  if (len2 === 0) return Math.hypot(px-ax, py-ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / len2));
  return Math.hypot(px-ax-t*dx, py-ay-t*dy);
}

// ============================================================
// UNDO / REDO
// ============================================================
function snapshot() {
  return {
    players: JSON.parse(JSON.stringify(S.players)),
    strokes: JSON.parse(JSON.stringify(S.strokes)),
    labels:  JSON.parse(JSON.stringify(S.labels)),
  };
}

function saveState() {
  S.undoStack.push(snapshot());
  S.redoStack = [];
  if (S.undoStack.length > 60) S.undoStack.shift();
}

function undo() {
  if (!S.undoStack.length) return;
  S.redoStack.push(snapshot());
  const prev = S.undoStack.pop();
  S.players = prev.players; S.strokes = prev.strokes; S.labels = prev.labels;
  redraw();
}

function redo() {
  if (!S.redoStack.length) return;
  S.undoStack.push(snapshot());
  const next = S.redoStack.pop();
  S.players = next.players; S.strokes = next.strokes; S.labels = next.labels;
  redraw();
}

// ============================================================
// APPLE PENCIL — PRESSURE HELPERS
// ============================================================
function getPressureWidth(pressure, base) {
  const pressureEnabled = document.getElementById('pressure-toggle').checked;
  if (!pressureEnabled || pressure <= 0) return base;
  // Map pressure 0→1 to 0.4×base → 2.5×base
  return base * (0.4 + pressure * 2.1);
}

function updatePressureBar(pressure) {
  document.getElementById('pressure-bar').style.width = (pressure * 100) + '%';
}

function showPencilDetected() {
  if (!PENCIL.detected) {
    PENCIL.detected = true;
    document.getElementById('pencil-badge').classList.add('visible');
    setStatus('Apple Pencil detected — pressure sensitivity active');
  }
}

// ============================================================
// POINTER EVENTS  (handles mouse, finger touch, Apple Pencil)
// ============================================================
canvas.addEventListener('pointerdown',  onPointerDown,  { passive: false });
canvas.addEventListener('pointermove',  onPointerMove,  { passive: false });
canvas.addEventListener('pointerup',    onPointerUp,    { passive: false });
canvas.addEventListener('pointerout',   onPointerUp,    { passive: false });
canvas.addEventListener('pointercancel',onPointerUp,    { passive: false });
canvas.addEventListener('contextmenu',  e => { e.preventDefault(); onRightClick(e); });

function isPalmRejected(e) {
  // If a finger touch comes in while pencil was recently used → reject it
  if (e.pointerType === 'touch') {
    const elapsed = Date.now() - PENCIL.lastPenTime;
    if (elapsed < PENCIL.PALM_REJECT_MS) return true;
  }
  return false;
}

function onPointerDown(e) {
  e.preventDefault();
  if (isPalmRejected(e)) return;

  if (e.pointerType === 'pen') {
    showPencilDetected();
    PENCIL.lastPenTime = Date.now();
    PENCIL.activePenId = e.pointerId;
    updatePressureBar(e.pressure);
  }

  // Capture so we get all subsequent events even outside canvas
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}

  const pos = canvasPos(e);
  const pressure = e.pointerType === 'pen' ? e.pressure : 0;
  const lw  = getPressureWidth(pressure, S.baseLineWidth);

  // Placing player from sidebar
  if (S.placingPlayer) {
    placePlayer(S.placingPlayer, pos.x, pos.y);
    S.placingPlayer = null;
    canvas.style.cursor = 'crosshair';
    document.querySelectorAll('.player-chip').forEach(c => c.classList.remove('placing'));
    setStatus('Player placed');
    return;
  }

  if (S.tool === 'select') {
    const pl = playerAt(pos.x, pos.y);
    if (pl) {
      saveState();
      S.dragging  = pl;
      S.dragOffX  = pos.x - pl.x;
      S.dragOffY  = pos.y - pl.y;
      canvas.style.cursor = 'grabbing';
      S.players = S.players.filter(p => p !== pl);
      S.players.push(pl);
    }
    return;
  }

  if (S.tool === 'eraser') {
    const si = strokeAt(pos.x, pos.y);
    if (si !== -1) { saveState(); S.strokes.splice(si, 1); redraw(); return; }
    const pl = playerAt(pos.x, pos.y);
    if (pl) { saveState(); S.players = S.players.filter(p => p !== pl); redraw(); return; }
    const li = labelAt(pos.x, pos.y);
    if (li !== -1) { saveState(); S.labels.splice(li, 1); redraw(); return; }
    return;
  }

  if (S.tool === 'text') {
    S.textPending = { x: pos.x, y: pos.y };
    document.getElementById('text-modal').classList.add('open');
    setTimeout(() => document.getElementById('text-input').focus(), 60);
    return;
  }

  // Drawing tools
  S.isDrawing = true;
  S.startX = pos.x; S.startY = pos.y;
  S.currentStroke = {
    type:   S.tool,
    points: [{ x: pos.x, y: pos.y, lw }],
    color:  S.color,
    lw,
  };
}

function onPointerMove(e) {
  e.preventDefault();
  if (isPalmRejected(e)) return;

  if (e.pointerType === 'pen') {
    PENCIL.lastPenTime = Date.now();
    updatePressureBar(e.pressure);
    // Get all coalesced points for maximum Pencil fidelity
    const allEvents = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];

    if (S.dragging) {
      // Use only last event for dragging
      const pos = canvasPos(allEvents[allEvents.length - 1]);
      S.dragging.x = pos.x - S.dragOffX;
      S.dragging.y = pos.y - S.dragOffY;
      redraw();
      return;
    }

    if (!S.isDrawing || !S.currentStroke) return;

    if (S.tool === 'curve') {
      for (const ce of allEvents) {
        const pos = canvasPos(ce);
        const lw  = getPressureWidth(ce.pressure, S.baseLineWidth);
        const pts = S.currentStroke.points;
        const last = pts[pts.length - 1];
        if ((pos.x - last.x)**2 + (pos.y - last.y)**2 > 4) {
          pts.push({ x: pos.x, y: pos.y, lw });
        }
      }
      S.currentStroke.lw = getPressureWidth(e.pressure, S.baseLineWidth);
    } else {
      const pos = canvasPos(e);
      const lw  = getPressureWidth(e.pressure, S.baseLineWidth);
      S.currentStroke.points = [
        { x: S.startX, y: S.startY, lw: S.currentStroke.points[0].lw },
        { x: pos.x, y: pos.y, lw }
      ];
      S.currentStroke.lw = lw;
    }
    redraw();
    return;
  }

  // Non-pencil (mouse / finger)
  const pos = canvasPos(e);

  if (S.dragging) {
    S.dragging.x = pos.x - S.dragOffX;
    S.dragging.y = pos.y - S.dragOffY;
    redraw(); return;
  }

  if (!S.isDrawing || !S.currentStroke) return;

  if (S.tool === 'curve') {
    const pts  = S.currentStroke.points;
    const last = pts[pts.length - 1];
    if ((pos.x - last.x)**2 + (pos.y - last.y)**2 > 16) {
      pts.push({ x: pos.x, y: pos.y, lw: S.baseLineWidth });
    }
  } else {
    S.currentStroke.points = [
      { x: S.startX, y: S.startY, lw: S.baseLineWidth },
      { x: pos.x, y: pos.y, lw: S.baseLineWidth }
    ];
  }
  redraw();
}

function onPointerUp(e) {
  e.preventDefault();
  if (e.pointerType === 'pen') {
    updatePressureBar(0);
    PENCIL.activePenId  = null;
    PENCIL.lastPenTime  = Date.now();
  }

  if (S.dragging) {
    S.dragging = null;
    canvas.style.cursor = S.tool === 'select' ? 'default' : 'crosshair';
    return;
  }

  if (S.isDrawing && S.currentStroke) {
    const pts = S.currentStroke.points;
    const dx  = pts[pts.length-1].x - pts[0].x;
    const dy  = pts[pts.length-1].y - pts[0].y;
    if (Math.hypot(dx, dy) > 4) {
      saveState();
      S.strokes.push({ ...S.currentStroke, points: [...pts] });
    }
    S.isDrawing = false;
    S.currentStroke = null;
    redraw();
  }
}

function onRightClick(e) {
  const pos = canvasPos(e);
  const pl  = playerAt(pos.x, pos.y);
  if (pl) { saveState(); S.players = S.players.filter(p => p !== pl); redraw(); }
}

// ============================================================
// TEXT MODAL
// ============================================================
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') closeTextModal(true);
  if (e.key === 'Escape') closeTextModal(false);
});

function closeTextModal(save) {
  document.getElementById('text-modal').classList.remove('open');
  if (save && S.textPending) {
    const text = document.getElementById('text-input').value.trim();
    if (text) {
      saveState();
      S.labels.push({ x: S.textPending.x, y: S.textPending.y, text, color: S.color });
      redraw();
    }
  }
  S.textPending = null;
}

// ============================================================
// TOOL MANAGEMENT
// ============================================================
function setTool(t) {
  S.tool = t;
  S.placingPlayer = null;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(`tool-${t}`);
  if (el) el.classList.add('active');
  canvas.style.cursor = t === 'select' ? 'default' : t === 'eraser' ? 'cell' : 'crosshair';
  const names = {
    select: 'Select & Move — drag players',
    arrow:  'Straight Arrow — drag to draw',
    dashed: 'Dashed Arrow — for cuts & off-ball',
    curve:  'Curved Arrow — Pencil freehand or drag',
    line:   'Plain Line — no arrowhead',
    screen: 'Screen/Pick — drag from setter to target',
    zone:   'Zone — drag to mark an area',
    text:   'Text Label — tap court to place',
    eraser: 'Eraser — tap strokes, players, or labels',
  };
  setStatus(names[t] || t);
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

// ============================================================
// COURT MODE
// ============================================================
function setCourt(mode) {
  S.courtMode = mode;
  document.getElementById('btn-full').classList.toggle('active', mode === 'full');
  document.getElementById('btn-half').classList.toggle('active', mode === 'half');
  resizeCanvas();
}

// ============================================================
// PLAYERS
// ============================================================
let _pid = 0;

function buildPlayerChips() {
  const offList = document.getElementById('offense-list');
  const defList = document.getElementById('defense-list');
  offList.innerHTML = ''; defList.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    offList.appendChild(makeChip('O', i, '#f07820'));
    defList.appendChild(makeChip('D', i, '#4aa8ff'));
  }
}

function makeChip(team, num, color) {
  const chip = document.createElement('div');
  chip.className = 'player-chip';
  chip.id = `chip-${team}-${num}`;
  chip.innerHTML = `
    <div class="p-circle ${team === 'O' ? 'p-off' : 'p-def'}">${num}</div>
    <span class="p-label">P${num}</span>`;
  chip.onclick = () => {
    setTool('select');
    S.placingPlayer = { team, num, color };
    document.querySelectorAll('.player-chip').forEach(c => c.classList.remove('placing'));
    chip.classList.add('placing');
    canvas.style.cursor = 'copy';
    setStatus(`Tap court to place ${team === 'O' ? 'Offense' : 'Defense'} #${num}`);
  };
  return chip;
}

function placePlayer(cfg, x, y) {
  saveState();
  S.players = S.players.filter(p => !(p.team === cfg.team && p.number === cfg.num));
  S.players.push({ id: ++_pid, x, y, team: cfg.team, number: cfg.num, color: cfg.color });
  redraw();
}

// ============================================================
// COLOR PALETTE
// ============================================================
const COLORS = [
  '#f07820','#ff3333','#4aa8ff','#44dd88',
  '#ffdd00','#ffffff','#cc44ff','#ff88cc',
  '#00cccc','#ff9944',
];

function buildColorPalette() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  for (const c of COLORS) {
    const sw = document.createElement('div');
    sw.className = 'c-swatch' + (c === S.color ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => {
      S.color = c;
      document.querySelectorAll('.c-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    };
    grid.appendChild(sw);
  }
}

// ============================================================
// FORMATIONS
// ============================================================
function ftCoord(xFt, yFt) {
  return { x: S.courtX + xFt * S.scale, y: S.courtY + yFt * S.scale };
}

const FORMATIONS = {
  '5out':  { O: [[9,4],[9,46],[20,2],[20,48],[17,25]],   D: [[10,5],[10,45],[22,3],[22,47],[22,25]] },
  'motion':{ O: [[14,10],[14,40],[22,5],[22,45],[18,25]], D: [[16,12],[16,38],[24,7],[24,43],[26,25]] },
  '23zone':{ O: [[14,18],[14,32],[24,10],[24,40],[20,25]],D: [[8,20],[8,30],[18,10],[18,40],[14,25]] },
  '13zone':{ O: [[14,18],[14,32],[24,10],[24,40],[20,25]],D: [[9,25],[16,15],[16,25],[16,35],[24,25]] },
  '1high': { O: [[14,25],[10,17],[10,33],[20,18],[20,32]],D: [[16,25],[14,17],[14,33],[24,18],[24,32]] },
  'press': { O: [[6,25],[20,12],[20,38],[32,20],[32,30]], D: [[8,25],[22,14],[22,36],[35,22],[35,28]] },
};

function applyFormation(name) {
  const f = FORMATIONS[name];
  if (!f) return;
  saveState();
  S.players = [];
  f.O.forEach(([x,y],i) => {
    const c = ftCoord(x, y);
    S.players.push({ id: ++_pid, x: c.x, y: c.y, team: 'O', number: i+1, color: '#f07820' });
  });
  f.D.forEach(([x,y],i) => {
    const c = ftCoord(x, y);
    S.players.push({ id: ++_pid, x: c.x, y: c.y, team: 'D', number: i+1, color: '#4aa8ff' });
  });
  redraw();
  setStatus(`Formation: ${name.toUpperCase()} — drag players to adjust`);
}

// ============================================================
// SAVE / LOAD PLAYS
// ============================================================
const STORAGE_KEY = 'hcb_plays_v1';
function loadSavedPlays() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function persistPlays(plays) { localStorage.setItem(STORAGE_KEY, JSON.stringify(plays)); }

function savePlay() {
  const name = document.getElementById('play-name-input').value.trim()
    || `Play ${Date.now().toString(36).toUpperCase()}`;
  const plays = loadSavedPlays();
  plays.unshift({
    id: Date.now(), name,
    courtMode: S.courtMode,
    players: JSON.parse(JSON.stringify(S.players)),
    strokes: JSON.parse(JSON.stringify(S.strokes)),
    labels:  JSON.parse(JSON.stringify(S.labels)),
  });
  if (plays.length > 30) plays.pop();
  persistPlays(plays);
  document.getElementById('play-name-input').value = '';
  renderSavedList();
  setStatus(`Play "${name}" saved!`);
}

function loadPlay(id) {
  const entry = loadSavedPlays().find(p => p.id === id);
  if (!entry) return;
  saveState();
  S.courtMode = entry.courtMode;
  S.players   = entry.players;
  S.strokes   = entry.strokes;
  S.labels    = entry.labels;
  document.getElementById('btn-full').classList.toggle('active', S.courtMode === 'full');
  document.getElementById('btn-half').classList.toggle('active', S.courtMode === 'half');
  resizeCanvas();
  setStatus(`Loaded: "${entry.name}"`);
}

function deletePlay(id) {
  persistPlays(loadSavedPlays().filter(p => p.id !== id));
  renderSavedList();
}

function renderSavedList() {
  const list = document.getElementById('saved-list');
  list.innerHTML = '';
  const plays = loadSavedPlays();
  if (!plays.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:3px 2px">No plays saved yet</div>';
    return;
  }
  for (const p of plays) {
    const chip = document.createElement('div');
    chip.className = 'saved-chip';
    chip.innerHTML = `
      <span class="saved-chip-name" title="${p.name}">${p.name}</span>
      <span class="saved-chip-del" onclick="event.stopPropagation();deletePlay(${p.id});renderSavedList()">✕</span>`;
    chip.onclick = () => loadPlay(p.id);
    list.appendChild(chip);
  }
}

// ============================================================
// CLEAR & EXPORT
// ============================================================
function clearBoard() {
  if (!confirm('Clear all plays, players, and labels?')) return;
  saveState();
  S.strokes = []; S.players = []; S.labels = [];
  redraw();
  setStatus('Board cleared');
}

function exportImage() {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#1a1a1a';
  tc.fillRect(0, 0, tmp.width, tmp.height);
  tc.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'hoop-culture-play.png';
  link.href = tmp.toDataURL('image/png');
  link.click();
  setStatus('Exported as PNG!');
}

// ============================================================
// ANIMATION
// ============================================================
const ANIM = { recording: false, frames: [], playing: false, frameIdx: 0, interval: null, recTimer: null };

function toggleAnimMode() {
  if (ANIM.recording)       stopRecording();
  else if (ANIM.frames.length) startPlayback();
  else                      startRecording();
}

function startRecording() {
  ANIM.recording = true; ANIM.frames = [];
  document.getElementById('btn-animate').textContent = '⏹ Stop Rec';
  document.getElementById('btn-animate').classList.add('btn-record');
  document.getElementById('rec-badge').classList.add('visible');
  document.getElementById('anim-controls').classList.remove('visible');
  ANIM.frames.push(snapshot());
  ANIM.recTimer = setInterval(() => {
    ANIM.frames.push(snapshot());
    setStatus(`⏺ Recording… ${ANIM.frames.length} frames — move players and draw now`);
  }, 80);
}

function stopRecording() {
  ANIM.recording = false;
  clearInterval(ANIM.recTimer);
  document.getElementById('btn-animate').classList.remove('btn-record');
  document.getElementById('rec-badge').classList.remove('visible');
  if (ANIM.frames.length > 1) {
    document.getElementById('btn-animate').textContent = '▶ Playback';
    setStatus(`Recorded ${ANIM.frames.length} frames — press ▶ Playback`);
    startPlayback();
  } else {
    ANIM.frames = [];
    document.getElementById('btn-animate').textContent = '⏺ Animate';
    setStatus('Recording too short');
  }
}

function startPlayback() {
  if (!ANIM.frames.length) return;
  ANIM.playing = true; ANIM.frameIdx = 0;
  document.getElementById('btn-animate').textContent = '⏺ Animate';
  const prog = document.getElementById('anim-progress');
  prog.max = ANIM.frames.length - 1; prog.value = 0;
  document.getElementById('anim-controls').classList.add('visible');
  document.getElementById('anim-play-btn').textContent = '⏸';
  updateAnimFrame(0);
  ANIM.interval = setInterval(advanceFrame, 80);
}

function advanceFrame() {
  if (!ANIM.playing) return;
  ANIM.frameIdx = (ANIM.frameIdx + 1) % ANIM.frames.length;
  updateAnimFrame(ANIM.frameIdx);
}

function updateAnimFrame(idx) {
  const f = ANIM.frames[idx]; if (!f) return;
  S.players = JSON.parse(JSON.stringify(f.players));
  S.strokes = JSON.parse(JSON.stringify(f.strokes));
  S.labels  = JSON.parse(JSON.stringify(f.labels));
  redraw();
  document.getElementById('anim-progress').value = idx;
  document.getElementById('anim-frame-label').textContent = `${idx+1}/${ANIM.frames.length}`;
}

function animPlayPause() {
  ANIM.playing = !ANIM.playing;
  document.getElementById('anim-play-btn').textContent = ANIM.playing ? '⏸' : '▶';
  if (ANIM.playing) ANIM.interval = setInterval(advanceFrame, 80);
  else clearInterval(ANIM.interval);
}

function animSeek(idx) { ANIM.frameIdx = idx; updateAnimFrame(idx); }

function stopAnimation() {
  clearInterval(ANIM.interval);
  ANIM.playing = false; ANIM.frames = []; ANIM.frameIdx = 0;
  document.getElementById('anim-controls').classList.remove('visible');
  document.getElementById('btn-animate').textContent = '⏺ Animate';
  setStatus('Animation cleared');
}

// ============================================================
// KEYBOARD SHORTCUTS  (for when used with a keyboard)
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (k === 'z') { e.preventDefault(); undo(); }
    if (k === 'y') { e.preventDefault(); redo(); }
    if (k === 's') { e.preventDefault(); exportImage(); }
    return;
  }
  if (k === 'v' || k === 'escape') setTool('select');
  if (k === 'a') setTool('arrow');
  if (k === 'd') setTool('dashed');
  if (k === 'c') setTool('curve');
  if (k === 'l') setTool('line');
  if (k === 's') setTool('screen');
  if (k === 'z') setTool('zone');
  if (k === 't') setTool('text');
  if (k === 'e') setTool('eraser');
  if (k === 'delete' || k === 'backspace') {
    if (S.strokes.length) { saveState(); S.strokes.pop(); redraw(); }
  }
});

// Prevent iOS rubber-band scroll when using Pencil on canvas
document.addEventListener('touchmove', e => {
  if (e.target === canvas) e.preventDefault();
}, { passive: false });

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

buildPlayerChips();
buildColorPalette();
renderSavedList();
resizeCanvas();
setStatus('Tap a tool — place players from the sidebar or pick a formation');
</script>
